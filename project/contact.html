                <h2 class="border-section mt-2 mb-2">CONTACT US</h2>
                <p class="mt-2"> you can connect with us whenever you want.</p>
            </div>
            <form action="" class="contact-form">
               <div class="form-in">
                    <label for="name">NAME</label>
                    <input type="text" name="name" id="name" placeholder="ENTER YOUR NAME" minlength="3">
               </div>
                <div class="form-in">
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email" placeholder="ENTER YOUR EMAIL">
                </div>
                <div class="form-in">
                    <label for="subject">SUBJECT</label>
                     <input type="text" name="subject" id="subject" placeholder="ENTER YOUR SUBJECT">
                </div>
                <div class="form-in">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="number" name="phone" id="phone" placeholder="ENTER YOUR PHONE NUMBER">
                </div>
                <textarea class="form-in" name="text-area" id="text-area" cols="30" rows="10" placeholder="ENTER YOUR MESSAGE "></textarea>
                <button class="sub">SUBMIT</button>
            </form>

        </div>
